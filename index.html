<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da memória</title>
    <link rel="stylesheet" href="./assets/styles/index.css">
</head>
<body>

    <header class="title">
        <h1>🪐 Jogo da Memória</h1>
    </header>

    <section class="score-info">
        <div class="score-box">
            <span>Pontuação:</span>
            <span id="score">0</span>
        </div>

        <div class="score-box">
            <span>Tentativas:</span>
            <span id="tentativas">0</span>
        </div>
    </section>

    <main class="container-cards">

        <!-- CARD BASE (vai ser replicado via JS depois) -->
        <div class="card" data-planet="">
            <div class="card-inner">
                <div class="card-front"></div>

                <div class="card-back">
                    <img class="image" src="" alt="Planeta">
                </div>
            </div>
        </div>

    </main>

</body>
</html>
